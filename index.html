<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Archivio Consuntivi — Gama Service</title>
<!-- PWA: rende la pagina installabile come app, con icona -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1F3864" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Consuntivi Gama" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --arancio: #E0701B;
    --arancio-scuro: #b8580f;
    --navy: #1F3864;
    --navy-chiaro: #2c4d8a;
    --sfondo: #f4f1ec;
    --carta: #ffffff;
    --grigio-chiaro: #f2f0ec;
    --grigio-muto: #7d7a74;
    --linea: #e3ded6;
    --scuro: #232020;
    --ok: #2e7d52;
    --ombra: 0 1px 2px rgba(31,56,100,.06), 0 8px 24px rgba(31,56,100,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--sfondo);
    color: var(--scuro);
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ---------- Intestazione ---------- */
  .testata {
    background: var(--navy);
    color: #fff;
    padding: 22px 0 20px;
    border-bottom: 4px solid var(--arancio);
  }
  .wrap { width: min(1040px, 92vw); margin: 0 auto; }
  .marchio { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .marchio .nome { font-size: clamp(22px, 4.5vw, 30px); font-weight: 800; letter-spacing: -.02em; }
  .marchio .nome b { color: var(--arancio); }
  .marchio .srl { font-size: 13px; font-weight: 600; color: #9fb0d0; letter-spacing: .14em; text-transform: uppercase; }
  .testata .occhiello {
    margin-top: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: #9fb0d0; letter-spacing: .04em;
  }

  /* ---------- Barra sezioni (cartelle) ---------- */
  .sezioni {
    position: sticky; top: 0; z-index: 5;
    background: rgba(244,241,236,.92); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--linea);
  }
  .sezioni-inner { display: flex; align-items: center; gap: 8px; padding: 12px 0; flex-wrap: wrap; }
  .tab {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--linea); background: var(--carta);
    color: var(--navy); font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 9px 15px; border-radius: 10px 10px 4px 4px; cursor: pointer;
    transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  .tab .ico { width: 16px; height: 16px; display: block; opacity: .7; }
  .tab .conta {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    background: var(--grigio-chiaro); color: var(--grigio-muto);
    padding: 1px 7px; border-radius: 20px; min-width: 22px; text-align: center;
  }
  .tab:hover { border-color: #cdbfa9; transform: translateY(-1px); }
  .tab[aria-selected="true"] {
    background: var(--arancio); border-color: var(--arancio); color: #fff;
  }
  .tab[aria-selected="true"] .ico { opacity: 1; filter: brightness(0) invert(1); }
  .tab[aria-selected="true"] .conta { background: rgba(255,255,255,.25); color: #fff; }
  .btn-ric {
    margin-left: auto; display: inline-flex; align-items: center; gap: 6px;
    border: 1px solid var(--linea); background: var(--carta); color: var(--navy);
    font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 13px;
    border-radius: 10px; cursor: pointer; transition: border-color .12s ease;
  }
  .btn-ric:hover { border-color: #cdbfa9; }
  .btn-ric svg { width: 15px; height: 15px; }

  /* ---------- Contenuto ---------- */
  main { padding: 26px 0 60px; }
  .intestazione-sezione { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .intestazione-sezione h1 { font-size: clamp(20px, 4vw, 26px); font-weight: 800; color: var(--navy); letter-spacing: -.02em; }
  .pallino { width: 10px; height: 10px; border-radius: 50%; background: var(--arancio); flex: none; }
  .mese-select {
    font: 700 14px/1 'Manrope', sans-serif;
    color: #1F3864;
    background: #fff;
    border: 1px solid #cdbfa9;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    margin-right: 6px;
  }
  .mese-select:hover { border-color: #E0701B; }
  .mese-select:focus { outline: 2px solid #E0701B; outline-offset: 1px; }
  .sottotitolo { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--grigio-muto); margin-bottom: 18px; }

  .cerca { position: relative; margin-bottom: 16px; max-width: 420px; }
  .cerca input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--scuro);
    padding: 11px 13px 11px 38px; border: 1px solid var(--linea); border-radius: 10px;
    background: var(--carta); transition: border-color .12s ease, box-shadow .12s ease;
  }
  .cerca input:focus { outline: none; border-color: var(--arancio); box-shadow: 0 0 0 3px rgba(224,112,27,.14); }
  .cerca svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--grigio-muto); }

  /* ---------- Lista file ---------- */
  .lista { display: flex; flex-direction: column; gap: 9px; }
  .riga {
    display: flex; align-items: center; gap: 14px;
    background: var(--carta); border: 1px solid var(--linea); border-radius: 12px;
    padding: 13px 15px; box-shadow: var(--ombra);
    transition: transform .12s ease, border-color .12s ease;
    animation: entra .28s ease both;
  }
  .riga:hover { transform: translateY(-1px); border-color: #cdbfa9; }
  .icona-doc { flex: none; width: 40px; height: 40px; border-radius: 9px; background: var(--grigio-chiaro); display: grid; place-items: center; }
  .icona-doc svg { width: 20px; height: 20px; color: var(--navy); }
  .info { flex: 1; min-width: 0; }
  .nome-file {
    font-weight: 700; font-size: 14.5px; color: var(--scuro);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .meta-file { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--grigio-muto); margin-top: 2px; }
  .azioni { flex: none; display: flex; align-items: center; gap: 8px; }
  .btn-vedi, .scarica, .btn-odl, .btn-carica-odl {
    display: inline-flex; align-items: center; gap: 7px;
    font-family: inherit; font-size: 13.5px; font-weight: 700;
    padding: 9px 14px; border-radius: 9px; cursor: pointer; text-decoration: none;
    transition: background .12s ease, border-color .12s ease, transform .12s ease;
  }
  .btn-carica-odl { background: #16a34a; color: #fff; border: 1px solid #16a34a; }
  .btn-carica-odl:hover { background: #15803d; border-color: #15803d; transform: translateY(-1px); }
  .btn-carica-odl:disabled { opacity: .6; cursor: default; transform: none; }
  .btn-carica-odl:focus-visible { outline: 3px solid rgba(22,163,74,.4); outline-offset: 2px; }
  .btn-carica-odl svg { width: 15px; height: 15px; }
  .btn-elimina { background: #fff; color: #dc2626; border: 1px solid #f0c0c0; display: inline-flex; align-items: center; gap: 7px; font-family: inherit; font-size: 13.5px; font-weight: 700; padding: 9px 14px; border-radius: 9px; cursor: pointer; transition: background .12s ease, border-color .12s ease, transform .12s ease; }
  .btn-elimina:hover { background: #dc2626; color: #fff; border-color: #dc2626; transform: translateY(-1px); }
  .btn-elimina:disabled { opacity: .6; cursor: default; transform: none; }
  .btn-elimina:focus-visible { outline: 3px solid rgba(220,38,38,.4); outline-offset: 2px; }
  .btn-elimina svg { width: 15px; height: 15px; }
  .btn-vedi { background: var(--arancio); color: #fff; border: 1px solid var(--arancio); }
  .btn-vedi:hover { background: var(--arancio-scuro); border-color: var(--arancio-scuro); transform: translateY(-1px); }
  .btn-odl { background: var(--navy); color: #fff; border: 1px solid var(--navy); }
  .btn-odl:hover { background: var(--navy-chiaro); border-color: var(--navy-chiaro); transform: translateY(-1px); }
  .btn-odl:focus-visible { outline: 3px solid rgba(31,56,100,.4); outline-offset: 2px; }
  .btn-odl svg { width: 15px; height: 15px; }
  .scarica { background: #fff; color: var(--navy); border: 1px solid var(--linea); }
  .scarica:hover { border-color: var(--navy); transform: translateY(-1px); }
  .btn-vedi:focus-visible, .scarica:focus-visible { outline: 3px solid rgba(224,112,27,.4); outline-offset: 2px; }
  .btn-vedi svg, .scarica svg { width: 15px; height: 15px; }

  /* ---------- Stati ---------- */
  .stato { text-align: center; padding: 60px 20px; color: var(--grigio-muto); }
  .stato .grande { font-size: 40px; margin-bottom: 12px; opacity: .55; }
  .stato p { font-size: 15px; }
  .stato button {
    margin-top: 16px; background: var(--navy); color: #fff; border: none;
    font-family: inherit; font-weight: 700; font-size: 13.5px; padding: 9px 18px;
    border-radius: 9px; cursor: pointer;
  }
  .stato button:hover { background: var(--navy-chiaro); }
  .spinner {
    width: 34px; height: 34px; margin: 0 auto 14px; border: 3px solid var(--linea);
    border-top-color: var(--arancio); border-radius: 50%; animation: gira .8s linear infinite;
  }
  @keyframes gira { to { transform: rotate(360deg); } }
  @keyframes entra { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---------- Tabella CREVAL Excel ---------- */
  .tab-excel-wrap { overflow-x: auto; border: 1px solid var(--linea); border-radius: 12px; background: var(--carta); box-shadow: var(--ombra); }
  table.excel { border-collapse: collapse; width: 100%; min-width: 1120px; font-size: 13px; }
  table.excel thead th {
    position: sticky; top: 0; background: var(--navy); color: #fff;
    font-weight: 700; text-align: left; padding: 11px 12px; white-space: nowrap;
    border-right: 1px solid rgba(255,255,255,.12); font-size: 12px; letter-spacing: .01em;
  }
  table.excel tbody td { padding: 10px 12px; border-top: 1px solid var(--linea); border-right: 1px solid var(--linea); vertical-align: top; }
  table.excel tbody tr:nth-child(even) { background: #faf8f4; }
  table.excel tbody tr:hover { background: #f1ece3; }
  table.excel td.num, table.excel th.num { text-align: right; white-space: nowrap; font-family: 'JetBrains Mono', monospace; }
  table.excel td.center { text-align: center; white-space: nowrap; }
  table.excel td.sede { font-weight: 700; color: var(--navy); min-width: 220px; }
  table.excel td.descr { min-width: 280px; white-space: normal; }
  table.excel .tag-noword { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; color: var(--grigio-muto); background: var(--grigio-chiaro); padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
  table.excel .btn-vedi, table.excel .btn-odl { padding: 7px 11px; font-size: 12.5px; }
  table.excel tfoot td { padding: 12px; font-weight: 800; color: var(--navy); background: #f1ece3; border-top: 2px solid var(--arancio); font-size: 14px; }
  .excel-azioni { display: flex; gap: 6px; flex-wrap: wrap; }
  @media (max-width: 560px) {
    table.excel .btn-vedi span, table.excel .btn-odl span { display: inline; }
  }

  /* ---------- Caricamento ODL ---------- */
  .odl-carica {
    background: var(--carta); border: 1px solid var(--linea); border-radius: 12px;
    padding: 16px; box-shadow: var(--ombra); margin-bottom: 18px;
  }
  .odl-carica h3 { font-size: 15px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
  .odl-carica .hint { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--grigio-muto); margin-bottom: 12px; }
  .odl-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-end; }
  .odl-campo { display: flex; flex-direction: column; gap: 5px; flex: 1 1 240px; min-width: 0; }
  .odl-campo label { font-size: 12px; font-weight: 700; color: var(--navy); }
  .odl-campo input[type=text] {
    font-family: inherit; font-size: 14px; color: var(--scuro);
    padding: 10px 12px; border: 1px solid var(--linea); border-radius: 9px; background: #fff;
  }
  .odl-campo input[type=text]:focus { outline: none; border-color: var(--arancio); box-shadow: 0 0 0 3px rgba(224,112,27,.14); }
  .odl-file-label {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    font-family: inherit; font-size: 13.5px; font-weight: 700; color: var(--navy);
    background: var(--grigio-chiaro); border: 1px dashed #cdbfa9; border-radius: 9px; padding: 10px 14px;
  }
  .odl-file-label:hover { border-color: var(--arancio); }
  .odl-file-nome { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--grigio-muto); margin-top: 4px; word-break: break-all; }
  .odl-btn-carica {
    display: inline-flex; align-items: center; gap: 8px; flex: none;
    background: var(--arancio); color: #fff; border: 1px solid var(--arancio);
    font-family: inherit; font-size: 14px; font-weight: 800; padding: 11px 18px;
    border-radius: 9px; cursor: pointer; transition: background .12s ease, transform .12s ease;
  }
  .odl-btn-carica:hover:not(:disabled) { background: var(--arancio-scuro); transform: translateY(-1px); }
  .odl-btn-carica:disabled { opacity: .55; cursor: not-allowed; }
  .odl-btn-carica svg { width: 16px; height: 16px; }
  .odl-esito { margin-top: 10px; font-size: 13px; font-weight: 700; }
  .odl-esito.ok { color: var(--ok); }
  .odl-esito.ko { color: #c0392b; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  @media (max-width: 560px) {
    .scarica span, .btn-vedi span, .btn-odl span { display: none; }
    .scarica, .btn-vedi, .btn-odl { padding: 10px 12px; }
    .riga { gap: 11px; padding: 11px 12px; }
  }

  /* ---------- Finestra di anteprima ---------- */
  .modale { position: fixed; inset: 0; z-index: 50; display: none; }
  .modale.aperta { display: block; }
  .modale-overlay { position: absolute; inset: 0; background: rgba(31,56,100,.55); }
  .modale-box {
    position: absolute; inset: 4vh 4vw; background: #fff; border-radius: 14px;
    overflow: hidden; display: flex; flex-direction: column;
    box-shadow: 0 24px 70px rgba(0,0,0,.4); animation: entra .2s ease both;
  }
  .modale-testa { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--navy); color: #fff; }
  .modale-titolo { font-weight: 700; font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modale-chiudi { background: rgba(255,255,255,.15); border: none; color: #fff; width: 34px; height: 34px; border-radius: 8px; font-size: 16px; cursor: pointer; flex: none; }
  .modale-chiudi:hover { background: rgba(255,255,255,.3); }
  .modale iframe { flex: 1; width: 100%; border: 0; background: #f7f7f7; }
  @media (max-width: 560px) { .modale-box { inset: 0; border-radius: 0; } }
</style>
</head>
<body>
  <header class="testata">
    <div class="wrap">
      <div class="marchio">
        <span class="nome"><b>GAMA</b> SERVICE</span>
        <span class="srl">S.R.L.</span>
      </div>
      <div class="occhiello">ARCHIVIO CONSUNTIVI · documenti su Google Drive</div>
    </div>
  </header>

  <nav class="sezioni">
    <div class="wrap sezioni-inner" id="tabs" role="tablist" aria-label="Sezioni"></div>
  </nav>

  <main>
    <div class="wrap">
      <div class="intestazione-sezione">
        <span class="pallino"></span>
        <h1 id="titoloSezione">CBRE</h1>
      </div>
      <div class="sottotitolo" id="sottotitolo">Carico i documenti…</div>

      <div class="cerca">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="filtro" placeholder="Cerca per nome…" autocomplete="off" />
      </div>

      <div id="contenuto"></div>
    </div>
  </main>

  <div class="pie">Gama Service S.R.L. · <b>Archivio Consuntivi</b></div>

  <div class="modale" id="modale" aria-hidden="true">
    <div class="modale-overlay" onclick="chiudiModale()"></div>
    <div class="modale-box" role="dialog" aria-modal="true" aria-label="Anteprima documento">
      <div class="modale-testa">
        <span class="modale-titolo" id="modaleTitolo">Documento</span>
        <button class="modale-chiudi" onclick="chiudiModale()" aria-label="Chiudi">✕</button>
      </div>
      <iframe id="modaleFrame" title="Anteprima documento"></iframe>
    </div>
  </div>

<script>
  // ====== CONFIGURAZIONE ======
  const FUNZIONE_URL = "https://europe-west1-gama-service.cloudfunctions.net/elencaConsuntiviDrive";
  const MESI_URL = "https://europe-west1-gama-service.cloudfunctions.net/elencaMesiConsuntivi";
  const TOKEN = "42c93fde15187744a4bd92b7d5074fb76709ed40e9871ea9";
  const NOMI_MESI = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  // "2026-06" -> "Giugno 2026"
  function meseLabel(m) {
    const p = String(m).split("-");
    const i = parseInt(p[1], 10) - 1;
    return (NOMI_MESI[i] || m) + " " + p[0];
  }
  const SEZIONI = [
    { key: "CBRE",         label: "CBRE" },
    { key: "CREVAL",       label: "CREVAL" },
    { key: "CREVAL_EXCEL", label: "CREVAL Excel", excel: true },
    { key: "DUSSMANN",     label: "DUSSMANN" },
    { key: "PREVENTIVI",   label: "Preventivi" },
    { key: "ODL",          label: "ODL", odl: true },
  ];

  const ICONA_CARTELLA = '<svg class="ico" viewBox="0 0 24 24" fill="none" stroke="#1F3864" stroke-width="2" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';
  const ICONA_DOC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/></svg>';
  const ICONA_SCARICA = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 12 5 5 5-5"/><path d="M5 21h14"/></svg>';
  const ICONA_OCCHIO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  const ICONA_UPLOAD_ODL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V7"/><path d="m6 11 6-6 6 6"/><path d="M5 21h14"/></svg>';
  const ICONA_CESTINO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>';

  let sezioneAttiva = SEZIONI[0].key;
  let meseAttivo = null;          // es. "2026-06" (scelto nel menu in alto)
  let mesiDisponibili = [];       // elenco "AAAA-MM" presenti su Drive
  const cache = {};   // "mese|categoria" -> array di file
  const conteggi = {}; // "mese|categoria" -> numero (per i badge)
  const chiave = (cat) => meseAttivo + "|" + cat;

  const el = (id) => document.getElementById(id);

  // ---- costruisco i tab ----
  function disegnaTab() {
    const tabs = el("tabs");
    const optMesi = mesiDisponibili.length
      ? mesiDisponibili.map(m => `<option value="${m}" ${m === meseAttivo ? "selected" : ""}>${meseLabel(m)}</option>`).join("")
      : `<option value="">— nessun mese —</option>`;
    tabs.innerHTML =
      `<select id="meseSelect" class="mese-select" title="Scegli il mese">${optMesi}</select>` +
      SEZIONI.map(s => `
      <button class="tab" role="tab" data-key="${s.key}"
              aria-selected="${s.key === sezioneAttiva}">
        ${ICONA_CARTELLA}<span>${s.label}</span>
        <span class="conta" id="conta-${s.key}">·</span>
      </button>`).join("") +
      `<button class="btn-ric" id="btnAggiorna" title="Aggiorna">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
        Aggiorna
      </button>`;
    tabs.querySelectorAll(".tab").forEach(b => {
      b.addEventListener("click", () => cambiaSezione(b.dataset.key));
    });
    el("btnAggiorna").addEventListener("click", () => caricaSezione(sezioneAttiva, true));
    const ms = el("meseSelect");
    if (ms) ms.addEventListener("change", () => cambiaMese(ms.value));
  }

  function cambiaMese(m) {
    if (!m || m === meseAttivo) return;
    meseAttivo = m;
    el("filtro").value = "";
    SEZIONI.forEach(s => { const b = el("conta-" + s.key); if (b) b.textContent = "·"; });
    caricaSezione(sezioneAttiva, true);
    SEZIONI.filter(s => s.key !== sezioneAttiva).forEach(s => caricaSezione(s.key, true));
  }

  function cambiaSezione(key) {
    if (key === sezioneAttiva && cache[chiave(key)]) return;
    sezioneAttiva = key;
    document.querySelectorAll(".tab").forEach(b =>
      b.setAttribute("aria-selected", b.dataset.key === key));
    const lbl = SEZIONI.find(s => s.key === key).label;
    el("titoloSezione").textContent = lbl;
    el("filtro").value = "";
    caricaSezione(key, false);
  }

  // ---- formatto la data ISO in gg/mm/aaaa ----
  function dataIt(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return "";
    const gg = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    return `${gg}/${mm}/${d.getFullYear()}`;
  }

  function pulisciNome(nome) {
    return nome.replace(/\.docx$/i, "");
  }

  // ---- carico l'elenco da Drive ----
  async function caricaSezione(categoria, forzaRicarica) {
    const cont = el("contenuto");
    const lbl = SEZIONI.find(s => s.key === categoria).label;

    const attiva = (categoria === sezioneAttiva);

    // La sezione "CREVAL Excel" non legge da Drive: legge le righe scritte
    // nell'Excel (collection Firestore "consuntivi", tipo "creval") tramite
    // il modulo in fondo alla pagina.
    if (SEZIONI.find(s => s.key === categoria)?.excel) {
      if (window.caricaCrevalExcel) {
        window.caricaCrevalExcel(attiva, forzaRicarica, meseAttivo);
      } else if (attiva) {
        cont.innerHTML = `<div class="stato"><div class="spinner"></div><p>Carico le righe Excel CREVAL…</p></div>`;
      }
      return;
    }

    // La sezione "ODL": carica/elenca i file ODL su Drive (categoria "ODL")
    // e mostra il pulsante per caricarne di nuovi.
    if (SEZIONI.find(s => s.key === categoria)?.odl) {
      if (window.caricaOdl) {
        window.caricaOdl(attiva, forzaRicarica, meseAttivo);
      } else if (attiva) {
        cont.innerHTML = `<div class="stato"><div class="spinner"></div><p>Carico gli ODL…</p></div>`;
      }
      return;
    }

    if (!meseAttivo) {
      if (attiva) {
        cont.innerHTML = `<div class="stato"><div class="grande">📂</div><p>Scegli un mese in alto per vedere i documenti.</p></div>`;
        el("sottotitolo").textContent = "Scegli un mese";
      }
      return;
    }

    const ck = chiave(categoria);
    if (cache[ck] && !forzaRicarica) {
      if (attiva) { mostraFile(cache[ck]); aggiornaSottotitolo(cache[ck].length, lbl); }
      return;
    }

    if (attiva) {
      cont.innerHTML = `<div class="stato"><div class="spinner"></div><p>Carico i documenti di ${lbl}…</p></div>`;
      el("sottotitolo").textContent = "Carico i documenti…";
    }

    try {
      const url = `${FUNZIONE_URL}?categoria=${encodeURIComponent(categoria)}&mese=${encodeURIComponent(meseAttivo)}&token=${encodeURIComponent(TOKEN)}`;
      const resp = await fetch(url);
      const dati = await resp.json();
      if (!resp.ok || !dati.ok) throw new Error(dati && dati.error ? dati.error : "Errore di lettura");

      const files = dati.files || [];
      cache[ck] = files;
      conteggi[ck] = files.length;
      const badge = el("conta-" + categoria);
      if (badge) badge.textContent = files.length;

      if (categoria === sezioneAttiva) {
        mostraFile(files);
        aggiornaSottotitolo(files.length, lbl);
      }
    } catch (err) {
      if (categoria === sezioneAttiva) {
        cont.innerHTML = `
          <div class="stato">
            <div class="grande">⚠️</div>
            <p>Non riesco a leggere i documenti.<br>Controlla la connessione e riprova.</p>
            <button id="btnRiprova">Riprova</button>
          </div>`;
        el("btnRiprova").addEventListener("click", () => caricaSezione(categoria, true));
        el("sottotitolo").textContent = "Errore di lettura";
      }
    }
  }

  function aggiornaSottotitolo(n, lbl) {
    el("sottotitolo").textContent = n === 0
      ? `Nessun documento in ${lbl}`
      : `${n} ${n === 1 ? "documento" : "documenti"} in ${lbl}`;
  }

  // ---- mostro i file (con filtro) ----
  function mostraFile(files) {
    const cont = el("contenuto");
    const q = el("filtro").value.trim().toLowerCase();

    // Separo gli ODL (PDF "... - ODL.pdf") dai consuntivi veri e propri.
    // IMPORTANTE: il programma quando salva sostituisce i caratteri vietati
    // ( / \ : * ? " < > | ) con "_". Per abbinare bene ODL e Word anche quando
    // il nome conteneva quei caratteri, normalizzo le chiavi allo STESSO modo.
    const normalizzaChiave = (s) => String(s || "")
      .replace(/[<>:"/\\|?*\x00-\x1F]/g, "_")   // stessi caratteri che pulisce il programma
      .replace(/\s+/g, " ")                        // spazi multipli → uno solo
      .trim()
      .toLowerCase();

    const odlMap = {};
    const principali = [];
    (files || []).forEach(f => {
      // Riconosco sia " - ODL.pdf" sia " - ODL 2.pdf", " - ODL 3.pdf" ecc.
      const m = /^(.*) - ODL(?: \d+)?\.pdf$/i.exec(f.name);
      if (m) {
        const chiave = normalizzaChiave(m[1]);
        // Se ci sono più ODL per lo stesso consuntivo, tengo il primo (gli altri
        // restano comunque raggiungibili, ma il bottone mostra il principale).
        if (!odlMap[chiave]) odlMap[chiave] = f;
      } else {
        principali.push(f);
      }
    });

    const elenco = q ? principali.filter(f => f.name.toLowerCase().includes(q)) : principali;

    if (principali.length === 0) {
      cont.innerHTML = `
        <div class="stato">
          <div class="grande">📂</div>
          <p>Qui non c'è ancora niente.<br>I documenti compaiono qui quando li crei dal programma.</p>
        </div>`;
      return;
    }
    if (elenco.length === 0) {
      cont.innerHTML = `<div class="stato"><div class="grande">🔍</div><p>Nessun documento trovato per «${q}».</p></div>`;
      return;
    }

    cont.innerHTML = `<div class="lista">` + elenco.map((f, i) => {
      const base = normalizzaChiave(f.name.replace(/\.docx$/i, ""));
      const odl = odlMap[base];
      const bottoneOdl = odl
        ? `<button class="btn-odl" data-id="${escAttr(odl.id)}" data-nome="ODL — ${escAttr(pulisciNome(f.name))}" onclick="apriVisualizza(this)" title="Visualizza l'ODL allegato">${ICONA_OCCHIO}<span>Visualizza ODL</span></button>`
        : "";
      // Pulsante CARICA ODL: sempre presente su ogni consuntivo. Carica il PDF
      // con il nome del consuntivo + " - ODL.pdf" così viene abbinato in automatico.
      // Il nome base del Word (senza .docx) serve per costruire il nome dell'ODL.
      const nomeBaseWord = f.name.replace(/\.docx$/i, "");
      const bottoneCaricaOdl = `<button class="btn-carica-odl" data-nomebase="${escAttr(nomeBaseWord)}" data-haodl="${odl ? "1" : "0"}" onclick="window.caricaOdlSuConsuntivo(this)" title="${odl ? "Sostituisci l'ODL di questo consuntivo" : "Carica l'ODL per questo consuntivo"}">${ICONA_UPLOAD_ODL}<span>${odl ? "Sostituisci ODL" : "Carica ODL"}</span></button>`;
      return `
      <div class="riga" style="animation-delay:${Math.min(i * 25, 300)}ms">
        <div class="icona-doc">${ICONA_DOC}</div>
        <div class="info">
          <div class="nome-file" title="${escHtml(f.name)}">${escHtml(pulisciNome(f.name))}</div>
          <div class="meta-file">${dataIt(f.data)} &nbsp;·&nbsp; Word</div>
        </div>
        <div class="azioni">
          ${bottoneOdl}
          ${bottoneCaricaOdl}
          <button class="btn-vedi" data-id="${escAttr(f.id)}" data-nome="${escAttr(pulisciNome(f.name))}" onclick="apriVisualizza(this)">
            ${ICONA_OCCHIO}<span>Visualizza</span>
          </button>
          <a class="scarica" href="${escAttr(f.link)}" target="_blank" rel="noopener" title="Scarica">
            ${ICONA_SCARICA}<span>Scarica</span>
          </a>
          <button class="btn-elimina" data-filename="${escAttr(f.name)}" data-nome="${escAttr(pulisciNome(f.name))}" data-haodl="${odl ? "1" : "0"}" data-odlbase="${escAttr(nomeBaseWord)}" onclick="window.eliminaFileConsuntivo(this)" title="Sposta nel cestino questo file su Drive">${ICONA_CESTINO}<span>Elimina</span></button>
        </div>
      </div>`;
    }).join("") + `</div>`;
  }

  function escHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function escAttr(s) { return escHtml(s); }

  // ---- finestra di anteprima ----
  function apriVisualizza(btn) {
    const id = btn.dataset.id;
    const nome = btn.dataset.nome || "Documento";
    el("modaleTitolo").textContent = nome;
    el("modaleFrame").src = "https://drive.google.com/file/d/" + id + "/preview";
    el("modale").classList.add("aperta");
    el("modale").setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }
  function chiudiModale() {
    el("modale").classList.remove("aperta");
    el("modale").setAttribute("aria-hidden", "true");
    el("modaleFrame").src = "";
    document.body.style.overflow = "";
  }
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") chiudiModale(); });

  // ---- CARICA ODL direttamente su un consuntivo ----
  // Token di SCRITTURA (lo stesso dell'app desktop). La pagina è ad uso interno.
  const CARICA_ODL_URL = "https://europe-west1-gama-service.cloudfunctions.net/caricaConsuntivoSuDrive";
  const CARICA_ODL_TOKEN = "158d76892c820bfc66e50db1801e2457b3ed21bf61ded634";

  function fileToBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(String(r.result).split(",")[1]);
      r.onerror = () => rej(new Error("Lettura file fallita"));
      r.readAsDataURL(file);
    });
  }

  // Chiamata dal pulsante "Carica ODL" su una riga consuntivo.
  window.caricaOdlSuConsuntivo = function (btn) {
    const nomeBaseWord = btn.dataset.nomebase;   // nome del Word senza .docx
    const giaPresente = btn.dataset.haodl === "1";
    if (giaPresente && !confirm("Questo consuntivo ha già un ODL. Vuoi sostituirlo con un nuovo file?")) return;

    // Creo al volo un input file nascosto e lo apro
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".pdf,application/pdf";
    input.style.display = "none";
    document.body.appendChild(input);

    input.addEventListener("change", async () => {
      const file = input.files && input.files[0];
      document.body.removeChild(input);
      if (!file) return;

      // Nome ODL = nome del consuntivo + " - ODL.pdf" (così si abbina da solo)
      const fileName = nomeBaseWord + " - ODL.pdf";

      // Feedback visivo sul pulsante
      const testoOrig = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `${ICONA_UPLOAD_ODL}<span>Carico…</span>`;

      try {
        const base64 = await fileToBase64(file);
        const resp = await fetch(CARICA_ODL_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            token: CARICA_ODL_TOKEN,
            fileBase64: base64,
            fileName: fileName,
            categoria: sezioneAttiva,          // CBRE o CREVAL (stessa cartella del consuntivo)
            mese: meseAttivo,
            mimeType: "application/pdf",
          }),
        });
        const dati = await resp.json();
        if (!resp.ok || !dati.ok) throw new Error(dati && dati.error ? dati.error : "Caricamento fallito");

        btn.innerHTML = `${ICONA_UPLOAD_ODL}<span>Caricato ✓</span>`;
        // Ricarico la sezione per far comparire il bottone "Visualizza ODL"
        setTimeout(() => caricaSezione(sezioneAttiva, true), 700);
      } catch (err) {
        btn.disabled = false;
        btn.innerHTML = testoOrig;
        alert("Errore nel caricamento dell'ODL:\n" + err.message);
      }
    });

    input.click();
  };

  // ---- ELIMINA un file consuntivo (e, se c'è, il suo ODL) ----
  // Usa la funzione server eliminaConsuntivoDrive che cerca per categoria+fileName+mese
  // e sposta nel cestino di Drive (recuperabile 30 giorni).
  const ELIMINA_URL = "https://europe-west1-gama-service.cloudfunctions.net/eliminaConsuntivoDrive";
  const ELIMINA_TOKEN = "158d76892c820bfc66e50db1801e2457b3ed21bf61ded634";

  async function eliminaPerNome(fileName) {
    const resp = await fetch(ELIMINA_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        token: ELIMINA_TOKEN,
        categoria: sezioneAttiva,   // CBRE o CREVAL
        fileName: fileName,
        mese: meseAttivo,
      }),
    });
    const dati = await resp.json();
    if (!resp.ok || !dati.ok) throw new Error(dati && dati.error ? dati.error : "Eliminazione fallita");
    return dati.eliminati || 0;
  }

  window.eliminaFileConsuntivo = async function (btn) {
    const nomeFileCompleto = btn.dataset.filename;   // nome esatto su Drive (con .docx)
    const nome = btn.dataset.nome || "questo file";
    const haOdl = btn.dataset.haodl === "1";
    const nomeBaseOdl = btn.dataset.odlbase || null;  // nome base per costruire "... - ODL.pdf"

    let messaggio = `Vuoi eliminare «${nome}»?\n\nIl file verrà spostato nel cestino di Google Drive (recuperabile per 30 giorni).`;
    if (haOdl) messaggio += `\n\nQuesto consuntivo ha anche un ODL: verrà eliminato anche quello.`;
    if (!confirm(messaggio)) return;

    const testoOrig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `${ICONA_CESTINO}<span>Elimino…</span>`;

    try {
      await eliminaPerNome(nomeFileCompleto);
      // Se c'era un ODL abbinato, elimino anche quello (nome base + " - ODL.pdf")
      if (haOdl && nomeBaseOdl) {
        try { await eliminaPerNome(nomeBaseOdl + " - ODL.pdf"); } catch (e) { console.warn("ODL non eliminato:", e); }
      }
      setTimeout(() => caricaSezione(sezioneAttiva, true), 500);
    } catch (err) {
      btn.disabled = false;
      btn.innerHTML = testoOrig;
      alert("Errore nell'eliminazione:\n" + err.message);
    }
  };


  // ---- avvio ----
  async function popolaMesi() {
    try {
      const resp = await fetch(`${MESI_URL}?token=${encodeURIComponent(TOKEN)}`);
      const dati = await resp.json();
      if (resp.ok && dati.ok && Array.isArray(dati.mesi)) mesiDisponibili = dati.mesi;
    } catch (e) { mesiDisponibili = []; }
    if (mesiDisponibili.length && !meseAttivo) meseAttivo = mesiDisponibili[0];
  }

  async function avvia() {
    await popolaMesi();
    disegnaTab();
    el("filtro").addEventListener("input", () => {
      if (SEZIONI.find(s => s.key === sezioneAttiva)?.excel) {
        if (window.filtraCrevalExcel) window.filtraCrevalExcel();
        return;
      }
      if (SEZIONI.find(s => s.key === sezioneAttiva)?.odl) {
        if (window.filtraOdl) window.filtraOdl();
        return;
      }
      if (cache[chiave(sezioneAttiva)]) mostraFile(cache[chiave(sezioneAttiva)]);
    });
    if (!meseAttivo) {
      el("sottotitolo").textContent = "Nessun documento ancora caricato";
      el("contenuto").innerHTML = `<div class="stato"><div class="grande">📂</div><p>Qui non c'è ancora niente.<br>I documenti compaiono quando li crei dal programma.</p></div>`;
      return;
    }
    caricaSezione(sezioneAttiva, false);
    // pre-carico in sottofondo i conteggi delle altre sezioni (per il mese scelto)
    SEZIONI.filter(s => s.key !== sezioneAttiva).forEach(s => caricaSezione(s.key, false));
  }
  avvia();

<script type="module">

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

  const firebaseConfig = {

  const db = getFirestore(initializeApp(firebaseConfig));

  // Stesse URL/token usati dal resto della pagina (per trovare i Word su Drive)
  const DRIVE_URL = "https://europe-west1-gama-service.cloudfunctions.net/elencaConsuntiviDrive";

  const OCCHIO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';

  // cache per mese: { righe, driveMatch }
  const cacheExcel = {};
  let righeCorrenti = [];      // righe del mese mostrato (per la ricerca)
  let matchCorrente = {};      // numero -> { wordId, odlId }
  let meseCorrente = null;

  function esc(s) {
    return String(s === null || s === undefined ? "" : s)
      .replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function euro(n) {
    const v = Number(n) || 0;
    return new Intl.NumberFormat("it-IT", { style: "currency", currency: "EUR" }).format(v);

  // "315/2026" oppure "" se la riga non ha numero (solo Excel)
  function numeroConsuntivo(r) {
    if (r.numero === null || r.numero === undefined || r.numero === "" || r.numero >= 900000) return "";
    const anno = r.dataDocumento ? String(r.dataDocumento).split("-")[0]
               : (r.mese ? String(r.mese).split("-")[0] : "");
    return anno ? `${r.numero}/${anno}` : `${r.numero}`;
  }

  // Scarica l'elenco dei Word CREVAL su Drive (per il mese) e costruisce:
  //  - mappa numero -> id del Word        (per il tasto "Visualizza")
  //  - mappa numero -> id dell'ODL (.pdf) (per il tasto "Visualizza ODL")
  async function caricaMatchDrive(mese) {
    const out = {};
    try {
      const url = `${DRIVE_URL}?categoria=CREVAL&mese=${encodeURIComponent(mese)}&token=${encodeURIComponent(DRIVE_TOKEN)}`;
      const resp = await fetch(url);
      const dati = await resp.json();
      if (!resp.ok || !dati.ok) return out;
      const files = dati.files || [];

      // separo gli ODL ("... - ODL.pdf") dai Word principali
      const odlMap = {}; const principali = [];
      files.forEach(f => {
        const m = /^(.*) - ODL\.pdf$/i.exec(f.name);
        if (m) odlMap[m[1].toLowerCase()] = f;
        else principali.push(f);
      });

      // per ogni Word, provo a leggere il numero consuntivo dal nome file
      principali.forEach(f => {
        const base = f.name.replace(/\.docx$/i, "");
        const mNum = base.match(/(\d{1,5})\s*[\/\-]\s*20\d{2}/);   // es. 315/2026 o 315-2026
        const num = mNum ? mNum[1] : null;
        if (!num) return;
        const odl = odlMap[base.toLowerCase()];
        out[num] = { wordId: f.id, wordNome: base, odlId: odl ? odl.id : null };

    return out;
  }

  async function caricaRighe(mese) {

      where("tipo", "==", "creval"), where("mese", "==", mese));
    const snap = await getDocs(q);
    const righe = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    righe.sort((a, b) => {
      const na = (a.numero === null || a.numero === undefined) ? 999999 : a.numero;
      const nb = (b.numero === null || b.numero === undefined) ? 999999 : b.numero;
      return na - nb;
    });
    return righe;
  }

  function render(filtro) {

    const righe = q
      ? righeCorrenti.filter(r =>
          [r.sede, r.descrizione, r.crevalTicket, r.crevalOdlNumero, numeroConsuntivo(r)]
            .some(v => String(v || "").toLowerCase().includes(q)))
      : righeCorrenti;

    if (righeCorrenti.length === 0) {
      cont.innerHTML = `<div class="stato"><div class="grande">📂</div><p>Nessuna riga CREVAL in questo mese.<br>Le righe compaiono qui quando vengono inserite nell'Excel CREVAL.</p></div>`;
      return;
    }
    if (righe.length === 0) {
      cont.innerHTML = `<div class="stato"><div class="grande">🔍</div><p>Nessuna riga trovata per «${esc(q)}».</p></div>`;
      return;
    }

    let totale = 0;
    const corpo = righe.map(r => {
      totale += Number(r.totale) || 0;
      const num = numeroConsuntivo(r);
      const numKey = (r.numero !== null && r.numero !== undefined && r.numero < 900000) ? String(r.numero) : null;
      const match = numKey ? matchCorrente[numKey] : null;

      let azioni = "";
      if (match && match.wordId) {
        azioni += `<button class="btn-vedi" data-id="${esc(match.wordId)}" data-nome="${esc(match.wordNome || r.sede)}" onclick="apriVisualizza(this)" title="Visualizza il consuntivo Word">${OCCHIO}<span>Visualizza</span></button>`;
        if (match.odlId) {
          azioni += `<button class="btn-odl" data-id="${esc(match.odlId)}" data-nome="ODL — ${esc(match.wordNome || r.sede)}" onclick="apriVisualizza(this)" title="Visualizza l'ODL allegato">${OCCHIO}<span>Visualizza ODL</span></button>`;
        }
      } else {
        azioni = `<span class="tag-noword">solo Excel</span>`;
      }

      return `<tr>
        <td class="sede">${esc(r.sede)}</td>
        <td class="center">${esc(r.crevalProvincia)}</td>
        <td>${esc(r.crevalRegione)}</td>
        <td class="num">${esc(r.crevalTicket)}</td>
        <td class="num">${esc(r.crevalOdlNumero)}</td>
        <td class="num">${esc(num)}</td>
        <td class="descr">${esc(r.descrizione)}</td>
        <td class="center">${esc(r.dataIntervento)}</td>
        <td class="num">${(r.ore || r.ore === 0) ? esc(r.ore) : ""}</td>
        <td class="num">${euro(r.costoMateriale)}</td>
        <td class="num">${euro(r.totale)}</td>
        <td><div class="excel-azioni">${azioni}</div></td>
      </tr>`;
    }).join("");

    cont.innerHTML = `
      <div class="tab-excel-wrap">
        <table class="excel">
          <thead><tr>
            <th>Sede e indirizzo/agenzia</th><th class="num">Prov.</th><th>Regione</th>
            <th class="num">Ticket (con C)</th><th class="num">ODL</th><th class="num">Consuntivo</th>
            <th>Descrizione intervento</th><th>Data</th><th class="num">Ore</th>
            <th class="num">Materiale</th><th class="num">Imponibile</th><th>Documento</th>
          </tr></thead>
          <tbody>${corpo}</tbody>
          <tfoot><tr>
            <td colspan="10" style="text-align:right">Totale imponibile mese</td>
            <td class="num">${euro(totale)}</td><td></td>
          </tr></tfoot>
        </table>
      </div>`;
  }

  // chiamata dal resto della pagina quando si apre/aggiorna la sezione
  window.caricaCrevalExcel = async function (attiva, forza, mese) {
    const cont = document.getElementById("contenuto");
    const sotto = document.getElementById("sottotitolo");
    const badge = document.getElementById("conta-CREVAL_EXCEL");

    if (!mese) {
      if (attiva) {
        cont.innerHTML = `<div class="stato"><div class="grande">📂</div><p>Scegli un mese in alto per vedere le righe CREVAL.</p></div>`;
        if (sotto) sotto.textContent = "Scegli un mese";
      }
      return;
    }

    if (cacheExcel[mese] && !forza) {
      righeCorrenti = cacheExcel[mese].righe;
      matchCorrente = cacheExcel[mese].match;
      meseCorrente = mese;
      if (badge) badge.textContent = righeCorrenti.length;
      if (attiva) { render(document.getElementById("filtro").value); aggiornaSotto(sotto); }
      return;
    }

    if (attiva) {
      cont.innerHTML = `<div class="stato"><div class="spinner"></div><p>Carico le righe dell'Excel CREVAL…</p></div>`;
      if (sotto) sotto.textContent = "Carico le righe…";
    }

    try {
      const [righe, match] = await Promise.all([caricaRighe(mese), caricaMatchDrive(mese)]);
      cacheExcel[mese] = { righe, match };
      righeCorrenti = righe; matchCorrente = match; meseCorrente = mese;
      if (badge) badge.textContent = righe.length;
      if (attiva) { render(document.getElementById("filtro").value); aggiornaSotto(sotto); }
    } catch (err) {
      if (attiva) {
        cont.innerHTML = `<div class="stato"><div class="grande">⚠️</div><p>Non riesco a leggere le righe CREVAL.<br>Controlla la connessione e riprova.</p><button id="btnRiprovaEx">Riprova</button></div>`;
        const b = document.getElementById("btnRiprovaEx");
        if (b) b.addEventListener("click", () => window.caricaCrevalExcel(true, true, mese));
        if (sotto) sotto.textContent = "Errore di lettura";
      }
    }
  };

  function aggiornaSotto(sotto) {
    if (!sotto) return;
    const n = righeCorrenti.length;
    sotto.textContent = n === 0 ? "Nessuna riga CREVAL" : `${n} ${n === 1 ? "riga" : "righe"} nell'Excel CREVAL`;
  }

  // ricerca live (chiamata dal campo "Cerca")
  window.filtraCrevalExcel = function () {
    render(document.getElementById("filtro").value);
  };
</script>
<script>
  // ============================================================
  // SEZIONE "ODL"
  // Elenca i file ODL su Drive (cartella Consuntivi/ODL del mese) e permette
  // di caricarne di nuovi dando un NOME (per capire a cosa si riferisce l'ODL).
  // L'elenco usa il token di SOLA LETTURA; il caricamento usa il token di
  // scrittura (lo stesso che usa l'app desktop per salvare i consuntivi).
  // ============================================================
  const ODL_LISTA_URL   = "https://europe-west1-gama-service.cloudfunctions.net/elencaConsuntiviDrive";
  const ODL_CARICA_URL  = "https://europe-west1-gama-service.cloudfunctions.net/caricaConsuntivoSuDrive";
  const ODL_TOKEN_LISTA = "42c93fde15187744a4bd92b7d5074fb76709ed40e9871ea9";

  // ⚠️ TOKEN DI SCRITTURA: serve per caricare i file su Drive. È lo stesso
  // token che usa l'app desktop. Mettendolo qui, chiunque apra questa pagina
  // può caricare file su Drive. Se preferisci, lo togliamo e mettiamo un login.
  const ODL_TOKEN_CARICA = "158d76892c820bfc66e50db1801e2457b3ed21bf61ded634";

  const ODL_OCCHIO = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  const ODL_SCARICA = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 12 5 5 5-5"/><path d="M5 21h14"/></svg>';
  const ODL_DOC = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/></svg>';
  const ODL_UPLOAD = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V7"/><path d="m6 11 6-6 6 6"/><path d="M5 21h14"/></svg>';

  const odlCache = {};        // mese -> array file
  let odlFile = null;         // File scelto da caricare
  let odlMeseCorrente = null;

  function odlEsc(s) {
    return String(s === null || s === undefined ? "" : s)
      .replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function odlDataIt(iso) {
    if (!iso) return "";
    const d = new Date(iso);
    if (isNaN(d)) return "";
    const gg = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    return `${gg}/${mm}/${d.getFullYear()}`;
  }
  function odlEstensione(nomeFile) {
    const m = /\.[A-Za-z0-9]{1,5}$/.exec(nomeFile || "");
    return m ? m[0] : "";
  }
  function odlPulisciNome(nome) {
    // niente caratteri che danno fastidio nei nomi file
    return String(nome).replace(/[\\/:*?"<>|]/g, "-").trim();
  }
  function fileInBase64(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = () => res(String(r.result).split(",")[1]);
      r.onerror = () => rej(new Error("Lettura file fallita"));
      r.readAsDataURL(file);
    });
  }

  window.caricaOdl = async function (attiva, forza, mese) {
    const cont = document.getElementById("contenuto");
    const sotto = document.getElementById("sottotitolo");
    const badge = document.getElementById("conta-ODL");
    odlMeseCorrente = mese;

    if (!mese) {
      if (attiva) {
        cont.innerHTML = `<div class="stato"><div class="grande">📂</div><p>Scegli un mese in alto per vedere e caricare gli ODL.</p></div>`;
        if (sotto) sotto.textContent = "Scegli un mese";
      }
      return;
    }

    if (odlCache[mese] && !forza) {
      if (badge) badge.textContent = odlCache[mese].length;
      if (attiva) odlRender(odlCache[mese], document.getElementById("filtro").value, sotto);
      return;
    }

    if (attiva) {
      cont.innerHTML = `<div class="stato"><div class="spinner"></div><p>Carico gli ODL…</p></div>`;
      if (sotto) sotto.textContent = "Carico gli ODL…";
    }

    try {
      const url = `${ODL_LISTA_URL}?categoria=ODL&mese=${encodeURIComponent(mese)}&token=${encodeURIComponent(ODL_TOKEN_LISTA)}`;
      const resp = await fetch(url);
      const dati = await resp.json();
      if (!resp.ok || !dati.ok) throw new Error(dati && dati.error ? dati.error : "Errore di lettura");
      const files = dati.files || [];
      odlCache[mese] = files;
      if (badge) badge.textContent = files.length;
      if (attiva) odlRender(files, document.getElementById("filtro").value, sotto);
    } catch (err) {
      if (attiva) {
        cont.innerHTML = `<div class="stato"><div class="grande">⚠️</div><p>Non riesco a leggere gli ODL.<br>Controlla la connessione e riprova.</p><button id="btnRiprovaOdl">Riprova</button></div>`;
        const b = document.getElementById("btnRiprovaOdl");
        if (b) b.addEventListener("click", () => window.caricaOdl(true, true, mese));
        if (sotto) sotto.textContent = "Errore di lettura";
      }
    }
  };

  window.filtraOdl = function () {
    const mese = odlMeseCorrente;
    if (mese && odlCache[mese]) odlRender(odlCache[mese], document.getElementById("filtro").value, document.getElementById("sottotitolo"));
  };

  function odlRender(files, filtro, sotto) {
    const cont = document.getElementById("contenuto");
    const q = (filtro || "").trim().toLowerCase();
    const elenco = q ? (files || []).filter(f => f.name.toLowerCase().includes(q)) : (files || []);

    const formHtml = `
      <div class="odl-carica">
        <h3>Carica un nuovo ODL</h3>
        <div class="hint">Dai un nome che faccia capire a cosa si riferisce (es. la sede o il ticket). Mese: ${odlEsc(odlMeseCorrente || "")}</div>
        <div class="odl-form">
          <div class="odl-campo">
            <label for="odlNome">Nome ODL</label>
            <input type="text" id="odlNome" placeholder="Es. CREVAL Via Busi Rezzato — C61986970" autocomplete="off" />
          </div>
          <div class="odl-campo" style="flex:0 1 auto">
            <label>File</label>
            <label class="odl-file-label" for="odlFileInput">${ODL_DOC}<span id="odlFileLabelTxt">Scegli file…</span></label>
            <input type="file" id="odlFileInput" style="display:none" accept=".pdf,.jpg,.jpeg,.png,.docx,.doc,.heic" />
            <div class="odl-file-nome" id="odlFileNome"></div>
          </div>
          <button class="odl-btn-carica" id="odlBtnCarica">${ODL_UPLOAD}<span>Carica ODL</span></button>
        </div>
        <div class="odl-esito" id="odlEsito"></div>
      </div>`;

    let listaHtml;
    if ((files || []).length === 0) {
      listaHtml = `<div class="stato"><div class="grande">📂</div><p>Nessun ODL caricato per questo mese.<br>Usa il riquadro qui sopra per caricarne uno.</p></div>`;
    } else if (elenco.length === 0) {
      listaHtml = `<div class="stato"><div class="grande">🔍</div><p>Nessun ODL trovato per «${odlEsc(q)}».</p></div>`;
    } else {
      listaHtml = `<div class="lista">` + elenco.map((f, i) => `
        <div class="riga" style="animation-delay:${Math.min(i * 25, 300)}ms">
          <div class="icona-doc">${ODL_DOC}</div>
          <div class="info">
            <div class="nome-file" title="${odlEsc(f.name)}">${odlEsc(f.name)}</div>
            <div class="meta-file">${odlDataIt(f.data)} &nbsp;·&nbsp; ODL</div>
          </div>
          <div class="azioni">
            <button class="btn-vedi" data-id="${odlEsc(f.id)}" data-nome="${odlEsc(f.name)}" onclick="apriVisualizza(this)">${ODL_OCCHIO}<span>Visualizza</span></button>
            <a class="scarica" href="${odlEsc(f.link)}" target="_blank" rel="noopener" title="Scarica">${ODL_SCARICA}<span>Scarica</span></a>
          </div>
        </div>`).join("") + `</div>`;
    }

    cont.innerHTML = formHtml + listaHtml;
    if (sotto) {
      const n = (files || []).length;
      sotto.textContent = n === 0 ? "Nessun ODL caricato" : `${n} ${n === 1 ? "ODL" : "ODL"} caricati`;
    }

    // collego gli eventi del form
    odlFile = null;
    const inputFile = document.getElementById("odlFileInput");
    inputFile.addEventListener("change", () => {
      odlFile = inputFile.files && inputFile.files[0] ? inputFile.files[0] : null;
      document.getElementById("odlFileLabelTxt").textContent = odlFile ? "Cambia file" : "Scegli file…";
      document.getElementById("odlFileNome").textContent = odlFile ? odlFile.name : "";
    });
    document.getElementById("odlBtnCarica").addEventListener("click", odlEseguiCaricamento);
  }

  async function odlEseguiCaricamento() {
    const esito = document.getElementById("odlEsito");
    const btn = document.getElementById("odlBtnCarica");
    const nome = odlPulisciNome(document.getElementById("odlNome").value);
    esito.className = "odl-esito";

    if (!nome) { esito.classList.add("ko"); esito.textContent = "Scrivi un nome per l'ODL."; return; }
    if (!odlFile) { esito.classList.add("ko"); esito.textContent = "Scegli il file da caricare."; return; }
    if (!odlMeseCorrente) { esito.classList.add("ko"); esito.textContent = "Scegli prima un mese in alto."; return; }

    btn.disabled = true;
    esito.classList.add("ok");
    esito.textContent = "Carico l'ODL su Drive…";

    try {
      const base64 = await fileInBase64(odlFile);
      const ext = odlEstensione(odlFile.name);
      const fileName = nome.endsWith(ext) ? nome : (nome + ext);

      const resp = await fetch(ODL_CARICA_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token: ODL_TOKEN_CARICA,
          fileBase64: base64,
          fileName: fileName,
          categoria: "ODL",
          mese: odlMeseCorrente,
          mimeType: odlFile.type || "application/octet-stream",
        }),
      });
      const dati = await resp.json();
      if (!resp.ok || !dati.ok) throw new Error(dati && dati.error ? dati.error : "Caricamento fallito");

      esito.classList.remove("ko"); esito.classList.add("ok");
      esito.textContent = "ODL caricato ✓";
      odlCache[odlMeseCorrente] = null;     // forza ricarica della lista
      setTimeout(() => window.caricaOdl(true, true, odlMeseCorrente), 600);
    } catch (err) {
      esito.classList.remove("ok"); esito.classList.add("ko");
      esito.textContent = "Errore: " + err.message;
      btn.disabled = false;
    }
  }
</script>
<script>
  // Service worker: abilita l'installazione e il funzionamento offline (solo la "scatola",
  // i dati dei file arrivano sempre dalla rete).
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    });
  }
</script>
